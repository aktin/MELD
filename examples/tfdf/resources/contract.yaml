inference:
  name: "stationary-admission-test"
  version: "latest"
  checksum: "sha256:..."
  image_tag: "examples/tfdf"

runtime:
  framework: "tensorflow-tfdf"
  # checksum: "sha256:..." # is this still necessary?
  version: "1.0.0"
  environment_variables:
    TF_CPP_MIN_LOG_LEVEL: 2

model:
  format: "tensorflow-tfdf"
  version: "1.0.0"
  # checksum: "sha256:..." # is this still necessary?
#  version: "latest"

input_schema:
  temporal_scope:
    type: "relative"   # relative | absolute
    value: "-P1M"       # ISO 8601 duration
    anchor: "2026-04-23T13:56:55.525240" # the anchor date for relative temporal scope

  features:
    - name: "cedis_code"
      datatype: "integer"
      required: true
    - name: "age"
      datatype: "string"
      required: true
    - name: "admission_time"
      datatype: "datetime"
      required: true
    - name: "triage_score"
      datatype: "integer"
      required: true

#  hyperparameters:
#    - name: "learning_rate"
#      datatype: "float"
#      required: true

  query:
    type: "sql"
    path: "long-query.sql"

output_schema:
  format: "csv"
  predictor:
    - name: "should_have_been_admitted"
      datatype: "integer"

logging:
  stdout:
    format: text
    level: INFO
  archive:
    format: jsonl
    path: logs/inference.jsonl
  required_fields:
    - run_id
    - artifact_id
    - model_id
    - framework
    - phase
