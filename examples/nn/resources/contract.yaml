inference:
  name: "stationary-admission-test"
  version: "0.1.0"


runtime:
  framework: "tensorflow"
  version: "0.1.0"
  # checksum: "sha256:519abbabb0b3e8f379c73b2754749b984cfc72d618bb5cd6529b65e2efcaf02d"
  image_tag: "ghcr.io/simhue/meld-examples-nn"
  environment_variables:
    TF_CPP_MIN_LOG_LEVEL: "3"

model:
  format: "tensorflow"
  version: "1.0.0"

input_schema:
  temporal_scope:
    type: "relative" # relative | absolute
    value: "-P1M" # ISO 8601 duration
    anchor: "2026-04-23T13:56:55.525240" # the anchor date for relative temporal scope

  features:
    - name: "cedis_code"
      datatype: "string"
      required: true
    - name: "age"
      datatype: "string"
      required: true
    - name: "admission_time"
      datatype: "datetime"
      required: true
    - name: "triage_score"
      datatype: "integer"
      required: true

#  hyperparameters:
#    - name: "learning_rate"
#      datatype: "float"
#      required: true

  query:
    type: "sql"
    checksum: ""

output_schema:
  format: "csv"
  predictor:
    - name: "admitted"
      datatype: "integer"

logging:
  stdout:
    format: text
    level: INFO
  archive:
    format: jsonl
    path: logs/inference.jsonl
  required_fields:
    - run_id
    - artifact_id
    - model_id
    - framework
    - phase
