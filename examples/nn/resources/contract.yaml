contract:
  name: "stationary-admission-test-nn"
  version: "0.2.0"

runtime:
  framework: "tensorflow"
  image:
    name: "ghcr.io/simhue/meld/runtime_examples/nn"
    tag: "0.2.0"
    digest: "sha256:af99356afc28955895878fea10db2c8aeb4917e178de76c301d1c15393982939"
  environment_variables:
    TF_CPP_MIN_LOG_LEVEL: "3"

input_schema:
  temporal_scope:
    type: "relative" # relative | absolute
    value: "-P1M" # ISO 8601 duration
    anchor: "2026-04-23T13:56:55.525240" # the anchor date for relative temporal scope

  features:
    - name: "cedis_code"
      datatype: "string"
    - name: "age"
      datatype: "string"
    - name: "admission_time"
      datatype: "datetime"
    - name: "triage_score"
      datatype: "integer"

  query:
    type: "sql"
    digest: "sha256:d1a7f2c577602fb47d78c25483559c2495691737fec9cb2d6aa106b2229e6537"

output_schema:
  format: "csv"
  predictor:
    - name: "admitted"
      datatype: "integer"

